{% set name = "awscrt" %}
{% set version = "0.32.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/a/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 92e749fce6c61da8db1af0baa6b7e96f7acf8a5574760b3d7880d190cedee8a0
  patches:
    - patches/0001-Don-t-force-static-linkage.patch
    - patches/0002-disable-osx-failing-tests.patch  # [osx]
    - patches/0003-disable-win-failing-test.patch  # [win]
    # Some tests expect status code 404 from httpbin.org, but server returns 503 in Anaconda environment.
    - patches/0004-Disable-404-status-code-tests.patch
    # Increase timeout for test_h2_client to 160 seconds to avoid timeout errors.
    - patches/0005-Increase-timeout-for-test-h2-client.patch

build:
  number: 1
  skip: true  # [py<38]
  script_env:
    # Unvendor AWS libs
    - AWS_CRT_BUILD_USE_SYSTEM_LIBS=1
    - AWS_CRT_BUILD_USE_SYSTEM_LIBCRYPTO=1
    # Cannot enable ed25519 with the current version of aws-c-cal 0.9.2
    # This feature is currently experimental: https://github.com/awslabs/aws-c-cal/blob/v0.9.2/CMakeLists.txt#L13
    # ed25519 tests are disabled using patch on OSX and WIN 
    # - AWS_CRT_BUILD_DISABLE_LIBCRYPTO_USE_FOR_ED25519_EVERYWHERE=1

  # These are also in requirements: https://github.com/awslabs/aws-crt-python/blob/v0.27.4/setup.py#L220-L230
  ignore_run_exports:
    - aws-c-sdkutils
    - aws-c-compression
    - openssl

requirements:
  build:
    - {{ stdlib('c') }}
    - {{ compiler('c') }}
  host:
    - python
    - pip
    - setuptools >=75.3.1
    - wheel >=0.45.1
    - s2n {{ s2n }}  # [linux]
    - openssl {{ openssl }}  # [not linux]
    - aws-c-common 0.14.0
    - aws-c-sdkutils 0.2.4
    - aws-c-cal 0.9.14
    - aws-c-io 0.26.3
    - aws-checksums 0.2.10
    - aws-c-compression 0.3.2
    - aws-c-event-stream 0.7.1
    - aws-c-http 0.11.0
    - aws-c-auth 0.10.3
    - aws-c-mqtt 0.15.2
    - aws-c-s3 0.12.5
  run:
    - python

test:
  source_files:
    - test
  imports:
    - awscrt
    - awscrt.auth
    - awscrt.cbor
    - awscrt.common
    - awscrt.crypto
    - awscrt.eventstream
    - awscrt.eventstream.rpc
    - awscrt.exceptions
    - awscrt.http
    - awscrt.io
    - awscrt.mqtt
    - awscrt.mqtt_request_response
    - awscrt.mqtt5
    - awscrt.s3
    - awscrt.websocket
  commands:
    - pip check
    - python -c "from importlib.metadata import version; assert(version('{{ name }}')=='{{ version }}')"
    - python -m unittest discover -s test -v
  requires:
    - pip
    - pytest
    - websockets >=15.0.1

about:
  home: https://github.com/awslabs/aws-crt-python
  summary: A common runtime for AWS Python projects
  description: Python 3 bindings for the AWS Common Runtime.
  license: Apache-2.0
  license_file: LICENSE
  license_family: Apache
  doc_url: https://awslabs.github.io/aws-crt-python
  dev_url: https://github.com/awslabs/aws-crt-python

extra:
  recipe-maintainers:
    - ocefpaf
    - xhochy